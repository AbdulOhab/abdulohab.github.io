<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Game Arcade — Online Multiplayer</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  .game-card {
    transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
  }
  .game-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);
  }
  .grid-preview { display: grid; gap: 3px; }
  .preview-cell {
    border-radius: 50%;
    aspect-ratio: 1;
    background-color: rgba(255,255,255,0.07);
    border: 1.5px solid rgba(255,255,255,0.1);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.55em;
    font-weight: 900;
    line-height: 1;
  }
  .pc-x  { color: #818cf8; }
  .pc-o  { color: #fb7185; }
  .pc-r  { background: radial-gradient(circle at 35% 35%, #f87171, #b91c1c); border: none; }
  .pc-y  { background: radial-gradient(circle at 35% 35%, #fde047, #a16207); border: none; }
</style>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-900 via-indigo-950 to-slate-900 text-white flex items-center justify-center p-5 font-sans">

  <div class="w-full max-w-2xl">

    <header class="text-center mb-10">
      <h1 class="text-4xl sm:text-5xl font-extrabold tracking-tight">Game Arcade</h1>
      <p class="text-slate-400 mt-2 text-sm sm:text-base">Play with a friend from anywhere — no accounts, no downloads.</p>
    </header>

    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">

      <!-- Tic-Tac-Toe 3×3 -->
      <a href="tic_tac_toe_three_by_three.html"
         class="game-card group bg-white/5 border border-white/10 hover:border-indigo-500/60 rounded-2xl p-5 flex flex-col items-center gap-4 no-underline">
        <div class="grid-preview w-20 h-20" style="grid-template-columns:repeat(3,1fr)">
          <div class="preview-cell pc-x">✕</div><div class="preview-cell pc-e"></div><div class="preview-cell pc-o">○</div>
          <div class="preview-cell pc-e"></div><div class="preview-cell pc-x">✕</div><div class="preview-cell pc-e"></div>
          <div class="preview-cell pc-o">○</div><div class="preview-cell pc-e"></div><div class="preview-cell pc-x">✕</div>
        </div>
        <div class="text-center">
          <p class="font-bold text-lg leading-tight">Tic-Tac-Toe</p>
          <p class="text-slate-400 text-xs mt-0.5">Classic 3 × 3</p>
        </div>
        <span class="mt-auto w-full text-center bg-indigo-600 group-hover:bg-indigo-500 transition rounded-xl py-2 text-sm font-semibold">
          Play →
        </span>
      </a>

      <!-- Tic-Tac-Toe 4×4 -->
      <a href="tic_tac_toe_four_by_four.html"
         class="game-card group bg-white/5 border border-white/10 hover:border-sky-500/60 rounded-2xl p-5 flex flex-col items-center gap-4 no-underline">
        <div class="grid-preview w-20 h-20" style="grid-template-columns:repeat(4,1fr)">
          <div class="preview-cell pc-x">✕</div><div class="preview-cell pc-e"></div><div class="preview-cell pc-o">○</div><div class="preview-cell pc-e"></div>
          <div class="preview-cell pc-e"></div><div class="preview-cell pc-x">✕</div><div class="preview-cell pc-e"></div><div class="preview-cell pc-o">○</div>
          <div class="preview-cell pc-o">○</div><div class="preview-cell pc-e"></div><div class="preview-cell pc-x">✕</div><div class="preview-cell pc-e"></div>
          <div class="preview-cell pc-e"></div><div class="preview-cell pc-o">○</div><div class="preview-cell pc-e"></div><div class="preview-cell pc-x">✕</div>
        </div>
        <div class="text-center">
          <p class="font-bold text-lg leading-tight">Tic-Tac-Toe</p>
          <p class="text-slate-400 text-xs mt-0.5">4 × 4 — 4 in a row</p>
        </div>
        <span class="mt-auto w-full text-center bg-sky-600 group-hover:bg-sky-500 transition rounded-xl py-2 text-sm font-semibold">
          Play →
        </span>
      </a>

      <!-- Connect Four -->
      <a href="connect_four.html"
         class="game-card group bg-white/5 border border-white/10 hover:border-yellow-500/60 rounded-2xl p-5 flex flex-col items-center gap-4 no-underline">
        <div class="grid-preview w-20 h-20" style="grid-template-columns:repeat(5,1fr)">
          <div class="preview-cell pc-e"></div><div class="preview-cell pc-e"></div><div class="preview-cell pc-e"></div><div class="preview-cell pc-e"></div><div class="preview-cell pc-e"></div>
          <div class="preview-cell pc-e"></div><div class="preview-cell pc-r"></div><div class="preview-cell pc-e"></div><div class="preview-cell pc-e"></div><div class="preview-cell pc-e"></div>
          <div class="preview-cell pc-y"></div><div class="preview-cell pc-r"></div><div class="preview-cell pc-e"></div><div class="preview-cell pc-e"></div><div class="preview-cell pc-e"></div>
          <div class="preview-cell pc-y"></div><div class="preview-cell pc-r"></div><div class="preview-cell pc-y"></div><div class="preview-cell pc-r"></div><div class="preview-cell pc-y"></div>
        </div>
        <div class="text-center">
          <p class="font-bold text-lg leading-tight">Connect Four</p>
          <p class="text-slate-400 text-xs mt-0.5">7 × 6 — drop &amp; connect</p>
        </div>
        <span class="mt-auto w-full text-center bg-yellow-600 group-hover:bg-yellow-500 transition rounded-xl py-2 text-sm font-semibold">
          Play →
        </span>
      </a>

    </div>

    <p class="text-center text-[11px] text-slate-600 mt-10">
      No backend · No accounts · Powered by HiveMQ MQTT over WebSocket
    </p>
  </div>

</body>
</html>
